</section><div id="lightboxOverlay" class="lightboxOverlay"><button class="overlayClose" type="button">×</button><img id="lightboxImage" alt="放大圖片" onclick="event.stopPropagation()"></div><div id="tipOverlay" class="tipOverlay"><button class="overlayClose" type="button">×</button><div id="tipCard" class="tipCard" onclick="event.stopPropagation()"></div></div><script async src="https://www.instagram.com/embed.js"></script><script async src="https://platform.twitter.com/widgets.js"></script><script async src="https://www.tiktok.com/embed.js"></script><script>document.querySelectorAll('.carouselBox').forEach(box=>{const imgs=[...box.querySelectorAll('img')];if(imgs.length>1){let i=0;setInterval(()=>{imgs[i].classList.remove('active');i=(i+1)%imgs.length;imgs[i].classList.add('active');},(Number(box.dataset.sec)||3)*1000);}});const lb=document.getElementById('lightboxOverlay'),li=document.getElementById('lightboxImage'),to=document.getElementById('tipOverlay'),tc=document.getElementById('tipCard');document.querySelectorAll('[data-lightbox-src]').forEach(el=>el.addEventListener('click',e=>{e.preventDefault();li.src=el.dataset.lightboxSrc;lb.classList.add('open')}));document.querySelectorAll('.tipTrigger[data-tip-text]').forEach(el=>el.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();tc.textContent=el.dataset.tipText||'';to.classList.add('open')}));[lb,to].forEach(o=>o.addEventListener('click',e=>{if(e.target===o||e.target.classList.contains('overlayClose'))o.classList.remove('open')}));function updateTimes(){document.querySelectorAll('.block[data-type="time"]').forEach(b=>{const d=b.dataset,n=new Date(),ds=d.timeDateSeparator||'/',ts=d.timeTimeSeparator||':',join=d.timeJoin||' ',date=[];if(d.timeYear==='1')date.push(String(n.getFullYear()));if(d.timeMonth==='1')date.push(String(n.getMonth()+1).padStart(2,'0'));if(d.timeDate==='1')date.push(String(n.getDate()).padStart(2,'0'));const parts=[];if(date.length)parts.push(date.join(ds));if(d.timeWeekday==='1')parts.push(['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][n.getDay()]);const time=[];let h=n.getHours();if(d.timeAmPm==='1')time.push(h<12?'AM':'PM');if(d.timeHour12==='1')h=h%12||12;if(d.timeHour==='1')time.push(String(h).padStart(2,'0'));if(d.timeMinute==='1')time.push(String(n.getMinutes()).padStart(2,'0'));if(d.timeSecond==='1')time.push(String(n.getSeconds()).padStart(2,'0'));if(time.length){const period=d.timeAmPm==='1';parts.push(period?time[0]+(time.length>1?' ':'')+time.slice(1).join(ts):time.join(ts))}const el=b.querySelector('.liveTime');if(el)el.textContent=parts.join(join)})}updateTimes();setInterval(updateTimes,1000);</script></body></html>
