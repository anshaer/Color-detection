<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨平台螢幕取色器</title>
    <style>
        :root {
            --mint-green: #a8e6cf;
            --choco-brown: #3e2723;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--choco-brown);
            color: var(--mint-green);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 取色按鈕設計 */
        #pick-btn {
            background-color: transparent;
            border: 2px solid var(--mint-green);
            color: var(--mint-green);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        #pick-btn:hover {
            background-color: var(--mint-green);
            color: var(--choco-brown);
            box-shadow: 0 0 15px rgba(168, 230, 207, 0.4);
        }

        #pick-btn:active {
            transform: scale(0.95);
        }

        /* 顏色預覽與資訊區 */
        #color-preview {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            border: 4px solid var(--mint-green);
            background-color: transparent;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s;
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 15px 20px;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
        }

        .label {
            font-size: 14px;
            opacity: 0.8;
            text-align: right;
            letter-spacing: 1px;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            user-select: all;
            transition: color 0.2s;
        }

        .value:hover {
            text-shadow: 0 0 8px var(--mint-green);
        }

        /* 複製成功提示 */
        #toast {
            position: fixed;
            bottom: 30px;
            background-color: var(--mint-green);
            color: var(--choco-brown);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .error-msg {
            color: #ff8a80;
            font-size: 14px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <button id="pick-btn">啟動螢幕取色 (吸管)</button>

    <div id="color-preview"></div>
    
    <div class="info-grid">
        <div class="label">HEX</div>
        <div class="value" id="hex-display" onclick="copyText(this.innerText)">#------</div>
        
        <div class="label">RGB</div>
        <div class="value" id="rgb-display" onclick="copyText(this.innerText)">---, ---, ---</div>
    </div>

    <div id="error-display" class="error-msg">您的瀏覽器目前不支援 EyeDropper API，請使用電腦版的 Chrome 或 Edge。</div>
    <div id="toast">已複製到剪貼簿！</div>

    <script>
        const pickBtn = document.getElementById('pick-btn');
        const colorPreview = document.getElementById('color-preview');
        const hexDisplay = document.getElementById('hex-display');
        const rgbDisplay = document.getElementById('rgb-display');
        const toast = document.getElementById('toast');
        const errorDisplay = document.getElementById('error-display');

        // 檢查瀏覽器是否支援 EyeDropper API
        if (!window.EyeDropper) {
            pickBtn.style.display = 'none';
            errorDisplay.style.display = 'block';
        }

        // Hex 轉 RGB
        function hexToRgb(hex) {
            // 移除可能帶有的 #
            hex = hex.replace(/^#/, '');
            const bigint = parseInt(hex, 16);
            const r = (bigint >> 16) & 255;
            const g = (bigint >> 8) & 255;
            const b = bigint & 255;
            return `${r}, ${g}, ${b}`;
        }

        // 啟動取色器
        pickBtn.addEventListener('click', async () => {
            const eyeDropper = new EyeDropper();
            
            try {
                // 開啟系統放大鏡，等待使用者點擊螢幕任何一處
                const result = await eyeDropper.open();
                const hexColor = result.sRGBHex.toUpperCase();
                
                // 更新畫面
                colorPreview.style.backgroundColor = hexColor;
                hexDisplay.innerText = hexColor;
                rgbDisplay.innerText = hexToRgb(hexColor);
                
                // 自動複製 Hex 色碼
                copyText(hexColor);

            } catch (e) {
                // 使用者按下 ESC 取消取色時會觸發 catch，可忽略
                console.log('取消取色');
            }
        });

        // 複製文字功能與動畫
        function copyText(text) {
            if (text.includes('-')) return; // 尚未取色前不執行
            
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        }

        let toastTimeout;
        function showToast() {
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
